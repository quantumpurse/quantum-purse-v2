name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Get version from tag
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          draft: false
          prerelease: false

  # ── CLI binaries ──────────────────────────────────────────────────

  build-cli:
    name: Build CLI
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: qpv2-cli
            asset_name: qpv2-cli-macos-arm64

          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: qpv2-cli
            asset_name: qpv2-cli-macos-x86_64

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: qpv2-cli
            asset_name: qpv2-cli-linux-x86_64

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: qpv2-cli.exe
            asset_name: qpv2-cli-windows-x86_64.exe

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: true

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Build release binary
      run: cargo build --package qpv2-cli --release --target ${{ matrix.target }} --verbose

    - name: Strip binary (Linux and macOS)
      if: matrix.os != 'windows-latest'
      run: strip target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ needs.create-release.outputs.upload_url }}
        asset_path: ./target/${{ matrix.target }}/release/${{ matrix.artifact_name }}
        asset_name: ${{ matrix.asset_name }}
        asset_content_type: application/octet-stream

  build-cli-universal-macos:
    name: Build Universal macOS CLI
    needs: create-release
    runs-on: macos-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: true

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-apple-darwin,x86_64-apple-darwin

    - name: Build for Apple Silicon
      run: cargo build --release --target aarch64-apple-darwin

    - name: Build for Intel
      run: cargo build --release --target x86_64-apple-darwin

    - name: Create universal binary
      run: |
        lipo -create \
          target/aarch64-apple-darwin/release/qpv2-cli \
          target/x86_64-apple-darwin/release/qpv2-cli \
          -output qpv2-cli-universal
        strip qpv2-cli-universal

    - name: Upload Universal Binary
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ needs.create-release.outputs.upload_url }}
        asset_path: ./qpv2-cli-universal
        asset_name: qpv2-cli-macos-universal
        asset_content_type: application/octet-stream

  # ── GUI bundles ───────────────────────────────────────────────────

  build-gui-macos:
    name: Build macOS GUI (.app unsigned)
    needs: create-release
    runs-on: macos-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Install build dependencies
      run: brew install automake gettext

    - name: Bundle app
      run: crates/qpv2-gui/scripts/bundle.sh --release

    - name: Package
      run: |
        cd target/release
        tar -czf qpv2-gui-macos-arm64.tar.gz qpv2.app

    - name: Upload
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ needs.create-release.outputs.upload_url }}
        asset_path: ./target/release/qpv2-gui-macos-arm64.tar.gz
        asset_name: qpv2-gui-macos-arm64.tar.gz
        asset_content_type: application/gzip

  build-gui-linux:
    name: Build Linux GUI
    needs: create-release
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Install build dependencies
      run: sudo apt-get update && sudo apt-get install -y gettext libgtk2.0-dev

    - name: Build pinentry-gtk-2
      run: vendor/build-pinentry.sh

    - name: Build GUI
      run: cargo build -p qpv2-gui --release

    - name: Build ckb-light-client
      run: |
        cargo build -p ckb-light-client --release \
          --manifest-path vendor/ckb-light-client/Cargo.toml

    - name: Build ckb
      run: |
        cargo build -p ckb --release \
          --manifest-path vendor/ckb/Cargo.toml

    - name: Package
      run: |
        mkdir -p qpv2-gui-linux-x86_64
        cp target/release/qpv2-gui qpv2-gui-linux-x86_64/
        cp vendor/pinentry-build/Linux-x86_64/pinentry-gtk-2 qpv2-gui-linux-x86_64/
        cp vendor/ckb-light-client/target/release/ckb-light-client qpv2-gui-linux-x86_64/
        cp vendor/ckb/target/release/ckb qpv2-gui-linux-x86_64/
        strip qpv2-gui-linux-x86_64/*
        tar -czf qpv2-gui-linux-x86_64.tar.gz qpv2-gui-linux-x86_64/

    - name: Upload
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ needs.create-release.outputs.upload_url }}
        asset_path: ./qpv2-gui-linux-x86_64.tar.gz
        asset_name: qpv2-gui-linux-x86_64.tar.gz
        asset_content_type: application/gzip

  build-gui-windows:
    name: Build Windows GUI
    needs: create-release
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          mingw-w64-x86_64-toolchain automake autoconf libtool make gettext-devel

    - name: Build pinentry-w32
      shell: msys2 {0}
      run: vendor/build-pinentry.sh

    - name: Build GUI
      run: cargo build -p qpv2-gui --release

    - name: Build ckb-light-client
      run: |
        cargo build -p ckb-light-client --release `
          --manifest-path vendor/ckb-light-client/Cargo.toml

    - name: Build ckb
      run: |
        cargo build -p ckb --release `
          --manifest-path vendor/ckb/Cargo.toml

    - name: Package
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Path qpv2-gui-windows-x86_64 -Force
        Copy-Item target/release/qpv2-gui.exe qpv2-gui-windows-x86_64/
        Copy-Item (Get-ChildItem vendor/pinentry-build/MINGW*/pinentry-w32.exe) qpv2-gui-windows-x86_64/
        Copy-Item vendor/ckb-light-client/target/release/ckb-light-client.exe qpv2-gui-windows-x86_64/
        Copy-Item vendor/ckb/target/release/ckb.exe qpv2-gui-windows-x86_64/
        Compress-Archive -Path qpv2-gui-windows-x86_64 -DestinationPath qpv2-gui-windows-x86_64.zip

    - name: Upload
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ needs.create-release.outputs.upload_url }}
        asset_path: ./qpv2-gui-windows-x86_64.zip
        asset_name: qpv2-gui-windows-x86_64.zip
        asset_content_type: application/zip
