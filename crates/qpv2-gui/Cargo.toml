[package]
name = "qpv2-gui"
version = "0.1.0"
edition = "2021"
description = "GUI for SPHINCS+ key vault with Passkey PRF / Touch ID support."
repository = "https://github.com/quantumpurse/quantum-purse-v2.git"
license = "MIT"

[[bin]]
name = "qpv2-gui"
path = "src/main.rs"

[dependencies]
qpv2-core = { path = "../qpv2-core" }
node-manager = { path = "../node-manager" }
passkey-prf = { path = "../passkey-prf" }
ckb-fips205-utils = { path = "../ckb-fips205-utils", features = ["signing"] }
ckb-gen-types = { version = "1.0.2", default-features = false }
ckb-jsonrpc-types = "1.0.2"
ckb-sdk = { version = "5.0.0", features = ["native-tls-vendored"] }
ckb-types = "=1.0.1"
eframe = "0.33"
hex = "0.4.3"

[target.'cfg(target_os = "macos")'.dependencies]
objc2 = "0.6"
objc2-foundation = { version = "0.3", features = ["NSThread"] }
objc2-app-kit = { version = "0.3", features = ["NSView", "NSWindow", "NSResponder"] }
raw-window-handle = "0.6"
